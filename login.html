<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEEOSKOP | Masuk</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=2000') no-repeat center center/cover;
            color: #fff; height: 100vh; display: flex; flex-direction: column; 
        }

        header { padding: 25px 4%; position: absolute; top: 0; left: 0; width: 100%; }
        .logo { font-size: 2.2rem; font-weight: 900; color: #d4af37; letter-spacing: 3px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); text-decoration: none; }

        .login-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 5%; }
        .login-box { background: rgba(0, 0, 0, 0.75); padding: 60px 50px; border-radius: 8px; width: 100%; max-width: 450px; backdrop-filter: blur(10px); }
        
        .login-box h2 { font-size: 2rem; margin-bottom: 30px; font-weight: 700; }
        
        .form-input { width: 100%; background: #333; border: none; border-radius: 4px; padding: 16px; color: #fff; margin-bottom: 20px; font-size: 1rem; outline: none; }
        .form-input:focus { background: #444; }
        
        .form-btn { width: 100%; background: #e50914; color: #fff; border: none; padding: 16px; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .form-btn:hover { background: #f40612; }

        .form-help { display: flex; justify-content: space-between; margin-top: 15px; color: #b3b3b3; font-size: 0.85rem; }
        
        .signup-text { margin-top: 40px; color: #737373; font-size: 1rem; }
        .signup-text a { color: #fff; text-decoration: none; font-weight: 600; cursor: pointer; }
        .signup-text a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .login-box { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">ZEEOSKOP</a>
    </header>

    <div class="login-container">
        <div class="login-box">
            <h2 id="auth-title">Masuk</h2>
            <form onsubmit="submitAuth(event)">
                <input type="email" class="form-input" placeholder="Email atau nomor telepon" required>
                <input type="password" class="form-input" placeholder="Sandi" required>
                <button type="submit" class="form-btn" id="auth-submit-btn">Masuk</button>
                <div class="form-help">
                    <label><input type="checkbox" checked> Ingat saya</label>
                    <a href="#" style="color: #b3b3b3; text-decoration: none;">Butuh bantuan?</a>
                </div>
            </form>
            <div class="signup-text" id="auth-switch-text">
                Baru di Zeeoskop? <a onclick="switchAuthMode('register')">Daftar sekarang.</a>
            </div>
        </div>
    </div>

    <script>
        function switchAuthMode(mode) {
            const title = document.getElementById('auth-title');
            const submitBtn = document.getElementById('auth-submit-btn');
            const switchText = document.getElementById('auth-switch-text');

            if (mode === 'register') {
                title.innerText = "Daftar";
                submitBtn.innerText = "Daftar";
                switchText.innerHTML = `Sudah punya akun? <a onclick="switchAuthMode('login')">Masuk di sini.</a>`;
            } else {
                title.innerText = "Masuk";
                submitBtn.innerText = "Masuk";
                switchText.innerHTML = `Baru di Zeeoskop? <a onclick="switchAuthMode('register')">Daftar sekarang.</a>`;
            }
        }

        function submitAuth(e) {
            e.preventDefault();
            // Menyimpan status login di browser menggunakan LocalStorage
            localStorage.setItem('zeeoskop_loggedIn', 'true');
            localStorage.setItem('zeeoskop_user', 'Klien VIP');
            
            // Redirect kembali ke halaman utama
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
